# アプリケーション名
spring.application.name=DevLog

# エンコーディング強制設定 (Windowsの文字化け対策)
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true

# --- データベース設定 (H2 Database) ---
spring.h2.console.enabled=true
# ファイル保存型に変更（停止してもデータが残ります）
spring.datasource.url=jdbc:h2:file:./data/devlogdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# テーブル構成を自動更新
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# --- AIサービス設定 ---
# ここにAPIキーを記載してください
google.gemini.api.key=YOUR_API_KEY_HERE