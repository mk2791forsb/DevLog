<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog | with AI執事 - 編集</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center min-vh-100 py-5">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">

            <div class="mb-3">
                <a href="/" class="text-decoration-none text-muted small fw-bold" style="transition: color 0.2s;">
                    <i class="bi bi-arrow-left me-1"></i>ダッシュボードに戻る
                </a>
            </div>

            <div class="card p-4 p-md-5">
                <div class="text-center mb-5">
                    <div class="header-icon">✍️</div>
                    <h3 class="fw-bold text-dark mb-2">記録の編集</h3>
                    <p class="text-muted small">ご主人様の過去の知見を、さらに洗練させましょう</p>
                </div>

                <form th:action="@{/update}" th:object="${record}" method="post">

                    <input type="hidden" th:field="*{id}">
                    <input type="hidden" th:field="*{createdAt}">
                    <input type="hidden" th:field="*{aiSummary}">
                    <input type="hidden" th:field="*{aiTags}">

                    <div class="mb-4">
                        <label for="editTitleInput" class="form-label">学習タイトル</label>
                        <input type="text" th:field="*{title}" id="editTitleInput" class="form-control" required>
                    </div>

                    <div class="mb-4">
                        <label for="editDurationInput" class="form-label">学習時間</label>
                        <div class="input-group">
                            <input type="number" th:field="*{duration}" id="editDurationInput" class="form-control" required>
                            <span class="input-group-text bg-transparent border-0 text-muted fw-bold">分</span>
                        </div>
                    </div>

                    <div class="mb-5">
                        <label for="editMemoInput" class="form-label">学習メモ</label>
                        <textarea th:field="*{memo}" id="editMemoInput" class="form-control" rows="6" required></textarea>
                    </div>

                    <div class="d-grid gap-3 d-md-flex justify-content-md-end">
                        <a href="/" class="btn btn-light rounded-pill px-4 py-2">キャンセル</a>
                        <button type="submit" class="btn btn-primary rounded-pill px-5 py-2">更新を保存</button>
                    </div>
                </form>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
