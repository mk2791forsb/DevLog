<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog | 記録の編集</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-body p-4">
                    <h2 class="card-title mb-4 h4 fw-bold">記録を修正する</h2>
                    <form th:action="@{/update}" th:object="${record}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{createdAt}">

                        <div class="mb-3">
                            <label for="editTitleInput" class="form-label small fw-bold text-secondary">学習内容</label>
                            <input type="text" th:field="*{title}" id="editTitleInput" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label for="editDurationInput" class="form-label small fw-bold text-secondary">学習時間 (分)</label>
                            <input type="number" th:field="*{duration}" id="editDurationInput" class="form-control" required>
                        </div>
                        <div class="mb-4">
                            <label for="editMemoInput" class="form-label small fw-bold text-secondary">メモ</label>
                            <textarea th:field="*{memo}" id="editMemoInput" class="form-control" rows="4"></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="/" class="btn btn-secondary px-4">戻る</a>
                            <button type="submit" class="btn btn-success px-4 fw-bold">更新を保存</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
