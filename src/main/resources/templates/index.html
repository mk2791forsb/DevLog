<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog | アルフレッドの伴走</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        /* グローバルスタイル定義
           エンジニアの集中力を削がない低コントラストかつ清潔感のある配色を採用
        */
        body { background-color: #f1f3f5; font-family: 'Segoe UI', 'Meiryo', sans-serif; color: #333; }
        .card { border-radius: 15px; border: none; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .ai-card { border-left: 6px solid #4e73df; background-color: #ffffff; }

        /* コンテンツ表示制御
           AIの出力が長文になった際のレイアウト崩れを防ぐため、
           約15行分(400px)の高さでスクロールを許容する
        */
        .advice-box {
            max-height: 400px;
            overflow-y: auto;
            background-color: #f8faff;
            padding: 20px;
            border-radius: 10px;
            font-size: 0.95rem;
            line-height: 1.7;
            border: 1px solid #eef2f7;
        }

        /* 統計コンポーネント用スタイル */
        .chart-container { height: 240px; position: relative; }
        .heatmap-tile { transition: transform 0.1s; cursor: help; }
        .heatmap-tile:hover { transform: scale(1.3); z-index: 10; }

        /* 動的オーバーレイ演出
           非同期通信(APIリクエスト)中のUX向上を目的とした視覚的フィードバック
        */
        #loading-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95); z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .is-invalid { border-color: #dc3545 !important; }
    </style>
</head>
<body class="pb-5">

<div id="loading-overlay">
    <div id="alfred-face" style="font-size: 5rem;">🧐</div>
    <h4 class="mt-4 fw-bold" id="alfred-text">分析の準備を整えております...</h4>
</div>

<nav class="navbar navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold">DevLog <small class="fw-normal text-muted">Core System</small></span>
    </div>
</nav>

<main class="container">
    <div class="row g-4">

        <div class="col-lg-5">

            <article class="card ai-card mb-4" th:if="${aiAdvice}">
                <div class="card-body">
                    <div class="d-flex align-items-center mb-3">
                        <span style="font-size: 1.5rem;" class="me-2">👨‍💼</span>
                        <h2 class="h6 card-title fw-bold text-primary m-0">AI執事アルフレッドの助言</h2>
                    </div>
                    <div class="advice-box shadow-sm" id="advice-content" th:text="${aiAdvice}"></div>
                </div>
            </article>

            <div class="text-center mb-4">
                <div style="cursor:help; display: inline-block;" data-bs-toggle="tooltip" data-bs-html="true"
                     title="アルフレッド：一流エンジニアを目指すご主人様を支える専属執事。テックリードの視点で分析を行います。">
                    <div style="font-size: 2rem;">👨‍💼</div>
                    <p class="text-muted small mb-0">AI執事：アルフレッド</p>
                </div>
            </div>

            <section class="card mb-4">
                <div class="card-body">
                    <h3 class="h6 card-title fw-bold mb-3 text-muted">学習アクティビティ</h3>
                    <div id="heatmap" class="d-flex flex-wrap gap-1"></div>
                </div>
            </section>

            <section class="card mb-4">
                <div class="card-body">
                    <h3 class="h6 card-title fw-bold mb-3 text-muted">学習時間の推移 (分)</h3>
                    <div class="chart-container">
                        <canvas id="studyChart"></canvas>
                    </div>
                </div>
            </section>

            <section class="card mb-4">
                <div class="card-body">
                    <h3 class="h6 card-title fw-bold mb-4">本日の研鑽を記録する</h3>
                    <form th:action="@{/add}" th:object="${newRecord}" method="post">
                        <div class="mb-3">
                            <label for="titleInput" class="form-label small fw-bold text-secondary">学習タイトル</label>
                            <input type="text" th:field="*{title}" id="titleInput" class="form-control"
                                   th:classappend="${#fields.hasErrors('title')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{title}"></div>
                        </div>
                        <div class="mb-3">
                            <label for="durationInput" class="form-label small fw-bold text-secondary">学習時間 (分)</label>
                            <input type="number" th:field="*{duration}" id="durationInput" class="form-control"
                                   th:classappend="${#fields.hasErrors('duration')} ? 'is-invalid'">
                            <div class="invalid-feedback" th:errors="*{duration}"></div>
                        </div>
                        <div class="mb-4">
                            <label for="memoInput" class="form-label small fw-bold text-secondary">備考・メモ</label>
                            <textarea th:field="*{memo}" id="memoInput" class="form-control" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm">記録を保存する</button>
                    </form>
                </div>
            </section>
        </div>

        <div class="col-lg-7">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <form action="/" method="get" class="d-flex gap-2">
                    <label class="visually-hidden" for="searchKeyword">検索キーワード</label>
                    <input type="text" name="keyword" id="searchKeyword" th:value="${keyword}"
                           class="form-control form-control-sm border-0 shadow-sm"
                           style="width: 220px;" placeholder="記録を検索...">
                    <button type="submit" class="btn btn-sm btn-secondary shadow-sm px-3">検索</button>
                </form>

                <a href="/advice" class="btn btn-sm btn-outline-primary fw-bold shadow-sm" onclick="showLoading()">
                    <span class="me-1">👨‍💼</span> AI執事アルフレッドの助言
                </a>
            </div>

            <div class="card shadow-sm overflow-hidden">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                        <tr class="small text-muted text-uppercase">
                            <th class="ps-4" style="width: 15%;">日付</th>
                            <th style="width: 60%;">内容</th>
                            <th style="width: 15%;">時間</th>
                            <th class="pe-4 text-end" style="width: 10%;"></th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="record : ${records}">
                            <td class="ps-4">
                                <div class="fw-bold" th:text="${#temporals.format(record.createdAt, 'MM/dd')}"></div>
                                <div class="text-muted" style="font-size: 0.7rem;" th:text="${#temporals.format(record.createdAt, 'HH:mm')}"></div>
                            </td>
                            <td>
                                <div class="fw-bold text-dark" th:text="${record.title}"></div>
                                <div class="small text-secondary text-truncate" style="max-width: 350px;" th:text="${record.memo}"></div>
                            </td>
                            <td>
                                <span class="badge rounded-pill bg-light text-primary border border-primary-subtle px-3" th:text="${record.duration + ' m'}"></span>
                            </td>
                            <td class="pe-4 text-end">
                                <a th:href="@{/delete/{id}(id=${record.id})}"
                                   class="btn btn-link btn-sm text-danger text-decoration-none"
                                   onclick="return confirm('削除しますか？')">削除</a>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</main>

<script th:inline="javascript">
    /* Thymeleafから渡されたJavaオブジェクトをJS変数として初期化 */
    const chartLabels = /*[[${chartLabels}]]*/ [];
    const chartData = /*[[${chartData}]]*/ [];
    const activityData = /*[[${activityData}]]*/ {};

    /**
     * 通信中のオーバーレイ表示とアルフレッドのアニメーションを制御
     */
    function showLoading() {
        const overlay = document.getElementById('loading-overlay');
        const face = document.getElementById('alfred-face');
        const text = document.getElementById('alfred-text');
        overlay.style.display = 'flex';

        const faces = ['🧐', '🤔', '📖', '💡', '✍️'];
        const messageList = ["記録を精査しております...", "分析を進めております...", "最適な助言を模索中です...", "まもなく報告いたします..."];
        let i = 0;
        setInterval(() => {
            face.innerText = faces[i % faces.length];
            text.innerText = messageList[i % messageList.length];
            i++;
        }, 1200);
    }

    /**
     * DOM読み込み完了後のコンポーネント初期化
     */
    window.onload = function() {
        // Markdownの変換（安全にパースを実行）
        const content = document.getElementById('advice-content');
        if(content && typeof marked !== 'undefined') {
            content.innerHTML = marked.parse(content.innerText);
        }

        // Bootstrapツールチップの有効化
        const tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle=\"tooltip\"]'))
        tooltipTriggerList.map(function (el) { return new bootstrap.Tooltip(el) });

        // 過去28日間の活動ヒートマップの描画
        const heatmapContainer = document.getElementById('heatmap');
        const today = new Date();
        for (let i = 27; i >= 0; i--) {
            const d = new Date();
            d.setDate(today.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            const count = activityData[dateStr] || 0;

            const tile = document.createElement('div');
            tile.className = 'heatmap-tile';
            tile.style.width = '13px'; tile.style.height = '13px'; tile.style.borderRadius = '2px';
            tile.title = `${dateStr} : ${count} 回の研鑽`;

            //GitHubライクなカラーパレットを適用
            if (count === 0) tile.style.backgroundColor = '#ebedf0';
            else if (count === 1) tile.style.backgroundColor = '#9be9a8';
            else if (count === 2) tile.style.backgroundColor = '#40c463';
            else tile.style.backgroundColor = '#216e39';

            heatmapContainer.appendChild(tile);
        }

        // 統計チャートのインスタンス生成
        const ctx = document.getElementById('studyChart').getContext('2d');
        if(typeof Chart !== 'undefined') {
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: chartLabels,
                    datasets: [{
                        data: chartData,
                        borderColor: '#4e73df',
                        backgroundColor: 'rgba(78, 115, 223, 0.05)',
                        borderWidth: 2,
                        tension: 0.3,
                        fill: true,
                        pointRadius: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: false },
                        y: { beginAtZero: true, grid: { color: '#f0f0f0' }, ticks: { font: { size: 10 } } }
                    }
                }
            });
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
</body>
</html>
