<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog | with AI執事</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="pb-5">

<div class="container mt-4">

    <div class="row mb-5 align-items-center">
        <div class="col-md-4">
            <form th:action="@{/}" method="get" class="d-flex bg-white rounded-pill shadow-sm overflow-hidden p-1 border">
                <input type="text" name="keyword" class="form-control bg-transparent border-0 shadow-none ps-3" placeholder="記録を検索..." th:value="${param.keyword}">
                <button class="btn border-0 text-muted pe-3" type="submit"><i class="bi bi-search"></i></button>
            </form>
        </div>

        <div class="col-md-4 text-center">
            <div class="butler-container">
                <div class="d-inline-flex align-items-center py-2 px-4 bg-white rounded-pill shadow-sm border" style="cursor: help;">
                    <div class="butler-icon">🤵‍♂️</div>
                    <span class="fw-bold" style="color: var(--text-main);">AI執事 アルフレッド</span>
                </div>
                <div class="speech-bubble fw-normal">
                    お帰りなさいませ。<br>
                    日々の学習の軌跡を、データとAIの力で<br>
                    ご主人様の確かな成長をサポートいたします。
                </div>
            </div>
        </div>

        <div class="col-md-4 text-end">
            <button class="btn btn-dark rounded-pill px-4 shadow-sm" type="button" data-bs-toggle="collapse" data-bs-target="#aiAdviceCollapse">
                <i class="bi bi-stars me-2 text-warning"></i>執事の助言
            </button>
        </div>
    </div>

    <div class="collapse mb-5" id="aiAdviceCollapse">
        <div class="card p-4" style="border-top: 4px solid var(--primary-color);">
            <div class="d-flex align-items-center mb-3">
                <i class="bi bi-cpu text-primary fs-4 me-2"></i>
                <h5 class="mb-0 fw-bold">AI解析レポート</h5>
            </div>
            <div id="aiAdviceContent" class="text-secondary lh-lg" th:utext="${aiAdvice != null ? aiAdvice : 'データ解析中...'}"></div>
        </div>
    </div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card p-3 mb-4">
                <h6 class="fw-bold mb-3 text-dark">新規ログの記録</h6>
                <form th:action="@{/}" th:object="${newRecord}" method="post">
                    <div th:if="${#fields.hasAnyErrors()}" class="alert alert-danger p-2 small rounded-3 mb-2">
                        <ul class="mb-0 px-3">
                            <li th:each="err : ${#fields.allErrors()}" th:text="${err}"></li>
                        </ul>
                    </div>

                    <div class="mb-2">
                        <input type="text" th:field="*{title}" class="form-control" placeholder="タイトル (例: Spring Bootの基礎)">
                    </div>

                    <div class="mb-2">
                        <div class="input-group">
                            <input type="number" th:field="*{duration}" class="form-control" placeholder="学習時間">
                            <span class="input-group-text bg-transparent border-0 text-muted py-0">分</span>
                        </div>
                    </div>

                    <div class="mb-3">
                        <textarea th:field="*{memo}" class="form-control" rows="3" placeholder="学びや課題を記述してください..."></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 rounded-pill py-1">保存・AI解析を実行</button>
                </form>
            </div>

            <div class="card p-3 mb-4">
                <h6 class="fw-bold mb-3 text-dark">アクティビティ</h6>
                <div id="heatmap" class="d-flex flex-wrap"></div>
            </div>
        </div>

        <div class="col-lg-8">
            <div th:if="${records.empty}" class="text-center py-5">
                <div class="butler-icon mb-3" style="width:60px; height:60px; font-size:2rem; background: none;">📝</div>
                <h5 class="text-muted fw-bold">ログがありません</h5>
                <p class="text-secondary small">ご主人様の最初の記録をお待ちしております。</p>
            </div>

            <div th:each="record : ${records}" class="card mb-3">
                <div class="card-body p-3">

                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <div>
                            <h5 class="card-title fw-bold mb-1 text-dark" th:text="${record.title}">タイトル</h5>
                            <div th:if="${record.aiTags != null}">
                                <span th:each="tag : ${#strings.arraySplit(record.aiTags, ',')}"
                                      class="tag-badge"
                                      th:text="${tag.trim()}"></span>
                            </div>
                        </div>
                        <span class="text-muted small" style="font-family: 'Inter', sans-serif;" th:text="${#temporals.format(record.createdAt, 'yyyy.MM.dd HH:mm')}"></span>
                    </div>

                    <p class="card-text text-secondary mb-3" style="white-space: pre-wrap; font-size: 0.95rem; line-height: 1.4;" th:text="${record.memo}"></p>

                    <div th:if="${record.aiSummary != null}" class="ai-summary-box mb-2">
                        <div class="d-flex align-items-start">
                            <i class="bi bi-stars text-primary mt-1 me-2"></i>
                            <div>
                                <strong class="small text-primary d-block mb-1">AI要約</strong>
                                <span class="small" th:text="${record.aiSummary}"></span>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center pt-2 border-top">
                        <span class="text-muted small fw-bold">
                            <i class="bi bi-clock me-1"></i>[[${record.duration}]] 分
                        </span>

                        <div class="d-flex gap-2">
                            <a th:href="@{/edit/{id}(id=${record.id})}" class="btn btn-light btn-sm rounded-pill px-3 py-1 text-secondary">
                                編集
                            </a>
                            <form th:action="@{/delete/{id}(id=${record.id})}" method="post"
                                  onsubmit="return confirm('ご主人様、この記録を削除してもよろしいですか？');">
                                <button type="submit" class="btn btn-light btn-sm rounded-pill px-3 py-1 text-danger">
                                    削除
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const chartLabels = /*[[${chartLabels}]]*/ [];
    const chartData = /*[[${chartData}]]*/ [];
</script>

<script>
    window.onload = function() {
        const aiAdviceEl = document.getElementById('aiAdviceContent');
        if (aiAdviceEl && aiAdviceEl.textContent) {
            aiAdviceEl.innerHTML = marked.parse(aiAdviceEl.textContent);
        }

        const heatmapContainer = document.getElementById('heatmap');
        if(heatmapContainer) {
            for (let i = 0; i < 28; i++) {
                const tile = document.createElement('div');
                tile.className = 'heatmap-tile';
                heatmapContainer.appendChild(tile);
            }
        }
    };
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
